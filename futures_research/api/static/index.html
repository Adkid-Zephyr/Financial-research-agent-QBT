<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>期货投研 Agent</title>
    <link rel="stylesheet" href="/static/consumer.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand-mark">FR</span>
          <span>
            <strong>期货投研 Agent</strong>
            <small>商品期货研究助手</small>
          </span>
        </a>
        <nav class="topnav" aria-label="主导航">
          <a href="/library">报告库</a>
          <a href="/docs" target="_blank" rel="noreferrer">API 文档</a>
          <a href="/admin#events-log" target="_blank" rel="noreferrer">后台运行日志</a>
        </nav>
      </header>

      <main>
        <section class="research-stage" aria-labelledby="research-title">
          <form id="consumer-run-form" class="search-panel">
            <div class="chat-heading">
              <p class="eyebrow">期货投研助手</p>
              <h1 id="research-title">你想研究什么？</h1>
            </div>
            <textarea
              id="research-prompt"
              name="prompt"
              aria-labelledby="research-title"
              rows="5"
              placeholder="例如：帮我看一下沪铜今天是偏多还是观望，重点关注外盘铜、美元指数、现货基差和数据缺口。"
            ></textarea>

            <div class="field-grid">
              <label>
                <span>品种</span>
                <input id="symbol-select" name="symbol" type="hidden" value="CF" />
                <button id="symbol-trigger" class="select-trigger" type="button">选择品种</button>
              </label>
              <label>
                <span>合约</span>
                <input id="contract-select" name="contract" type="hidden" value="" />
                <button id="contract-trigger" class="select-trigger" type="button">选择合约</button>
              </label>
              <label>
                目标日期
                <input id="target-date" name="target_date" type="date" />
              </label>
              <label>
                书写模式
                <select id="report-render-mode" name="report_render_mode">
                  <option value="hybrid">经典模式</option>
                  <option value="llm">模型推理</option>
                  <option value="grounded_llm">增强推理</option>
                </select>
              </label>
            </div>

            <div class="form-actions">
              <button id="start-research" class="primary" type="submit">开始研究</button>
            </div>
          </form>

          <div id="picker-modal" class="picker-modal hidden" role="dialog" aria-modal="true" aria-labelledby="picker-modal-title">
            <div class="picker-dialog">
              <div class="picker-head">
                <h3 id="picker-modal-title">选择</h3>
                <button id="picker-close" class="ghost" type="button">关闭</button>
              </div>
              <div id="picker-search-wrap" class="picker-search hidden">
                <label for="picker-search">搜索品种</label>
                <input id="picker-search" type="search" placeholder="输入品种名称、代码或交易所" autocomplete="off" />
              </div>
              <div id="picker-options" class="picker-table" aria-label="可选列表"></div>
            </div>
          </div>
        </section>

        <section class="workspace">
          <article class="answer-panel">
            <div class="section-head">
              <div>
                <p class="eyebrow">研究结果</p>
                <h2>研报</h2>
              </div>
              <div class="download-actions">
                <a id="download-md" class="chip-link hidden" target="_blank" rel="noreferrer">Markdown</a>
                <a id="download-pdf" class="chip-link hidden" target="_blank" rel="noreferrer">PDF</a>
              </div>
            </div>

            <div id="research-status" class="research-status idle" aria-live="polite">
              <span id="status-spinner" class="status-spinner hidden" aria-hidden="true"></span>
              <div>
                <strong id="run-status">还没有开始研究</strong>
                <span id="status-detail">输入问题后点击开始研究。</span>
              </div>
            </div>

            <div id="progress-steps" class="progress-steps">
              <span data-step="aggregate">整理数据</span>
              <span data-step="analyze">形成观点</span>
              <span data-step="write">撰写研报</span>
              <span data-step="review">检查风险</span>
            </div>

            <div id="answer-empty" class="empty-state">
              研报生成后会出现在这里。正文支持标题、列表、表格和代码块渲染，并在框内滚动阅读。
            </div>
            <div id="report-shell" class="report-shell hidden">
              <article id="report-view" class="report-view hidden"></article>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script src="/static/markdown-renderer.js"></script>
    <script src="/static/consumer.js"></script>
  </body>
</html>
